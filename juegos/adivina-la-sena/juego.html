<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Juego interactivo accesible para adivinar señas de la Lengua de Señas Peruana por niveles.">
  <title>Adivina la seña</title>
  <style>
    html,body{margin:0;min-height:100%;background:#f0f4f8;font-family:Arial,Helvetica,sans-serif;color:#102a43;}
    .estado-carga{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px;text-align:center;color:#486581;font-weight:800;}
    iframe{display:block;width:100%;min-height:100vh;border:0;background:#ffffff;}
  </style>
</head>
<body>
  <div id="estado-carga" class="estado-carga">Cargando Adivina la seña...</div>
  <iframe id="juego" title="Adivina la seña" hidden></iframe>
  <script>
    (async function(){
      const estado = document.getElementById('estado-carga');
      const iframe = document.getElementById('juego');
      const fuenteOriginal = 'https://raw.githubusercontent.com/gabriel-lsp/juegos-interactivos-accesibles/03ec7056d98805e84ff063d5b5df240c2b16ba6b/juegos/adivina-la-sena.html';
      const contacto = 'https://gabriel-lsp.github.io/accesos-complementarios/contacto.html';

      try{
        const respuesta = await fetch(fuenteOriginal, {cache:'no-store'});
        if(!respuesta.ok){throw new Error('No se pudo cargar la versión original del juego.');}
        let html = await respuesta.text();

        html = html.replace('<a href="../index.html" class="enlace-cabecera">Volver</a>', '<div class="enlaces-cabecera"><a href="../../index.html" class="enlace-cabecera">Volver a JIA</a><a href="' + contacto + '" class="enlace-cabecera">Contacto Institucional</a></div>');
        html = html.replace(/<div class="franja-info"><span class="chip">5 alternativas<\/span><span class="chip">Niveles progresivos<\/span><span class="chip">Reconocimiento simbólico<\/span><\/div>/, '');
        html = html.replace('</style>', '.enlaces-cabecera{display:flex;align-items:center;justify-content:flex-end;flex-wrap:wrap;gap:12px}.franja-info{display:none!important}@media(max-width:640px){.enlaces-cabecera{justify-content:flex-start}}</style>');

        iframe.removeAttribute('hidden');
        estado.style.display = 'none';
        iframe.srcdoc = html;

        function ajustarAltura(){
          try{
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            const alto = Math.max(doc.body.scrollHeight, doc.documentElement.scrollHeight, window.innerHeight);
            iframe.style.height = alto + 'px';
          }catch(error){
            iframe.style.height = '100vh';
          }
        }

        iframe.addEventListener('load', function(){
          ajustarAltura();
          setTimeout(ajustarAltura, 500);
          setTimeout(ajustarAltura, 1500);
        });
        window.addEventListener('resize', ajustarAltura);
      }catch(error){
        console.error(error);
        estado.innerHTML = 'No se pudo cargar el juego. <a href="../../index.html">Volver a JIA</a>';
      }
    })();
  </script>
</body>
</html>
